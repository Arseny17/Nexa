{% load static %}
<header class="header">
    <div class="header-container">
        <div class="logo">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">Nexa</a>
        </div>

        <nav class="nav">
            <ul class="nav-list">
                <li>
                    <a href="/" class="{% if request.path == '/' %}active{% endif %}">Главная</a>
                </li>
                <li>
                    <a href="/categories/"
                        class="{% if request.path|slice:':11' == '/categories' %}active{% endif %}">Категории</a>
                </li>
                <li>
                    <a href="/catalog/"
                        class="{% if request.path|slice:':8' == '/catalog' %}active{% endif %}">Каталог</a>
                </li>
                <li>
                    <a href="/brands/" class="{% if request.path|slice:':7' == '/brands' %}active{% endif %}">Бренды</a>
                </li>
                <li>
                    <a href="/contact/"
                        class="{% if request.path|slice:':8' == '/contact' %}active{% endif %}">Контакты</a>
                </li>
            </ul>
        </nav>

        <div class="header-actions">
            <button class="theme-toggle" id="themeToggle">
                <img id="themeIcon" src="{% static 'images/white_theme_icon.png' %}" alt="theme">
            </button>

            <a href="/cart/" class="cart">Корзина</a>
            <a href="/account/" class="account">Вход</a>

            <button class="hamburger" id="hamburger">&#9776;</button>
        </div>
    </div>

    <nav class="mobile-nav" id="mobileNav">
        <ul>
            <li><a href="/" class="{% if request.path == '/' %}active{% endif %}">Главная</a></li>
            <li><a href="/categories/">Категории</a></li>
            <li><a href="/catalog/">Каталог</a></li>
            <li><a href="/brands/">Бренды</a></li>
            <li><a href="/contact/">Контакты</a></li>
            <li><a href="/cart/">Корзина</a></li>
            <li><a href="/account/">Вход</a></li>
        </ul>
    </nav>
</header>

<script>
    const themeToggle = document.getElementById("themeToggle");
    const themeIcon = document.getElementById("themeIcon");

    function updateThemeIcon() {
        if (document.body.classList.contains("dark-theme")) {
            themeIcon.src = "{% static 'images/dark_theme_icon.png' %}";
        } else {
            themeIcon.src = "{% static 'images/white_theme_icon.png' %}";
        }
    }

    themeToggle.addEventListener("click", () => {
        document.body.classList.toggle("dark-theme");
        document.body.classList.toggle("light-theme");
        updateThemeIcon();
    });

    updateThemeIcon();

    const hamburger = document.getElementById("hamburger");
    const mobileNav = document.getElementById("mobileNav");

    hamburger.addEventListener("click", () => {
        mobileNav.classList.toggle("active");
    });
</script>
